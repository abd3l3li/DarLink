services:
  backend:
    build: backend
    ports:
      - 8080:8080
    environment:
      - POSTGRES_DB=example
    networks:
      - darlink
  db:
    image: postgres:18
    restart: always
    secrets:
      - db-password
    volumes:
      - db-data:/var/lib/postgresql/18/main
    networks:
      - darlink
    environment:
      - POSTGRES_DB=example
      - POSTGRES_PASSWORD_FILE=/run/secrets/db-password
    expose:
      - 5432
volumes:
  db-data:
secrets:
  db-password:
    file: db/password.txt
networks:
  darlink: