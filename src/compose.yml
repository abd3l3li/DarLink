services:
  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    ports:
      - 8080:80
      - 1337:443
      - 5173:5173
    networks:
      - darlink
    volumes:
      - ./front-end:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    ports:
      - 8081:8081
    secrets:
      - db-password
    networks:
      - darlink
    env_file:
      - back-end/.env
    depends_on:
      db:
        condition: service_healthy
    # OPS: share the backup volume so BackupHealthIndicator can read last_backup
    volumes:
      - db-backups:/var/backups/darlink
    # OPS: Actuator /health probed every 30s; backend is only "healthy" once Spring
    # has fully started and the DB connection pool is live.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  db:
    #image: postgres:18
    build: db
    restart: always
    secrets:
      - db-password
    volumes:
      - db-data:/var/lib/postgresql/18/main
      # OPS: backup output directory mounted into db container for pg_dump access
      - db-backups:/var/backups/darlink
    networks:
      - darlink
    environment:
      - POSTGRES_DB=DarLink
      - POSTGRES_USER=DarLink
      - POSTGRES_PASSWORD_FILE=/run/secrets/db-password
#    ports:
#      - 5432:5432
    expose:
      - 5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U DarLink -d DarLink" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
  # OPS: named volume for database backups — survives container restarts
  db-backups:
secrets:
  db-password:
    file: db/secrets/password.txt
networks:
  darlink:

