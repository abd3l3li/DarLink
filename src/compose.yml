services:
  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    ports:
      - 5173:5173
    networks:
      - darlink
    volumes:
      - ./front-end:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
  
  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    ports:
      - 8081:8081
    secrets:
      - db-password
    networks:
      - darlink
    env_file:
      - back-end/.env
    depends_on:
      - db
  db:
    #image: postgres:18
    build: db
    restart: always
    secrets:
      - db-password
    volumes:
      - db-data:/var/lib/postgresql/18/main
    networks:
      - darlink
    environment:
      - POSTGRES_DB=DarLink
      - POSTGRES_USER=DarLink
      - POSTGRES_PASSWORD_FILE=/run/secrets/db-password
    ports:
      - 5432:5432
    expose:
      - 5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U DarLink -d DarLink" ]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  db-data:
secrets:
  db-password:
    file: db/secrets/password.txt
networks:
  darlink:

