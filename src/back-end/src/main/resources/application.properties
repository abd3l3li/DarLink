spring.application.name=DarLink
# Name of the Spring Boot application (used in logs, monitoring, etc.)


# Automatically updates the database schema based on your entities
# (good for development, avoid in production)
spring.jpa.hibernate.ddl-auto=update

# Database connection URL pulled from environment variable
spring.datasource.url=${DB_URL}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=https://localhost:1337/login/oauth2/code/google

spring.security.user.name=admin
spring.security.user.password=password

# Database username from environment variable
spring.datasource.username=${DB_USERNAME}

# Database password from environment variable
spring.datasource.password=${DB_PASSWORD}

# JDBC driver for PostgreSQL (use this instead of H2 when running Postgres)
spring.datasource.driver-class-name=org.postgresql.Driver

# Prints executed SQL queries in the console (useful for debugging)
spring.jpa.show-sql=true

# Secret key used to sign and verify JWT tokens (must stay private)
jwt.secret=${JWT_SECRET}

# Token validity duration (usually in milliseconds)
jwt.expiration=${JWT_EXPIRATION}

# Server port; defaults to 8443 if SERVER_PORT is not set
server.port=${SERVER_PORT:8080}

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.oauth2=DEBUG


# Your 42 app's unique identifier (like a username for your app)
spring.security.oauth2.client.registration.42.client-id=${42_CLIENT_ID}

# Your 42 app's secret key (like a password for your app)
spring.security.oauth2.client.registration.42.client-secret=${42_CLIENT_SECRET}

# What info we are asking 42 for (public = basic profile info)
spring.security.oauth2.client.registration.42.scope=public

# The type of OAuth2 flow we are using (authorization_code is the standard flow)
spring.security.oauth2.client.registration.42.authorization-grant-type=authorization_code

# Where 42 should redirect the user after login
spring.security.oauth2.client.registration.42.redirect-uri=http://localhost:1337/login/oauth2/code/42

# Where the 42 login page is located
spring.security.oauth2.client.provider.42.authorization-uri=https://api.intra.42.fr/oauth/authorize

# Where we exchange the code for a token after login
spring.security.oauth2.client.provider.42.token-uri=https://api.intra.42.fr/oauth/token

# Where we get the user info (name, email, etc) after getting the token
spring.security.oauth2.client.provider.42.user-info-uri=https://api.intra.42.fr/v2/me

# The field name in the 42 response that contains the username
spring.security.oauth2.client.provider.42.user-name-attribute=login