server {
    listen 80;
    server_name _;

    # http://localhost:8080
    return 301 https://$host:1337$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name localhost darlink.com _; # Handle everything here

    client_max_body_size 30m;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Serve the built React app
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /uploads/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # backend rest
    location /api/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $http_host; # Use $http_host to preserve port
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 1337;
    }

    # backend oauth2
    location /oauth2/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $http_host; # Use $http_host to preserve port
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 1337;
    }

    # backend oauth2 callback
    location /login/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $http_host; # Use $http_host to preserve port
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 1337;
    }

    # websocket
    location /ws/ {
        proxy_pass http://backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # test page
    location = /ws-test.html {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
    }

    # OPS: Spring Boot Actuator — only /health and /info are permitted (enforced by SecurityConfig)
    location /actuator/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}