<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="800" fill="#f5f7fa"/>

  <!-- HERO SECTION -->
  <rect x="0" y="0" width="1200" height="300" fill="#ffffff"/>

  <!-- Left Image Placeholder -->
  <rect x="80" y="60" width="420" height="180" rx="12" fill="#d9e3f0"/>
  <text x="290" y="160" text-anchor="middle" font-size="16" fill="#555">
    Image
  </text>

  <!-- Right Text -->
  <text x="650" y="120" font-size="36" font-weight="bold" fill="#333">
    About DarLink
  </text>

  <text x="650" y="160" font-size="16" fill="#666">
    Connecting people with spaces through a modern platform
  </text>

  <!-- Button -->
  <rect x="650" y="190" width="150" height="40" rx="20" fill="#2563eb"/>
  <text x="725" y="215" text-anchor="middle" font-size="14" fill="white">
    Learn More
  </text>


  <!-- FEATURES SECTION -->
  <text x="600" y="380" text-anchor="middle" font-size="28" font-weight="bold" fill="#333">
    What We Offer
  </text>

  <!-- Feature Cards -->
  <rect x="180" y="420" width="220" height="120" rx="12" fill="#ffffff" stroke="#ddd"/>
  <text x="290" y="470" text-anchor="middle" font-size="16" fill="#333">Easy Booking</text>

  <rect x="490" y="420" width="220" height="120" rx="12" fill="#ffffff" stroke="#ddd"/>
  <text x="600" y="470" text-anchor="middle" font-size="16" fill="#333">Secure Platform</text>

  <rect x="800" y="420" width="220" height="120" rx="12" fill="#ffffff" stroke="#ddd"/>
  <text x="910" y="470" text-anchor="middle" font-size="16" fill="#333">Community</text>


  <!-- TEAM SECTION -->
  <text x="600" y="620" text-anchor="middle" font-size="28" font-weight="bold" fill="#333">
    Our Team
  </text>

  <!-- Team Members -->
  <circle cx="350" cy="700" r="40" fill="#d9e3f0"/>
  <text x="350" y="760" text-anchor="middle" font-size="14" fill="#333">Member 1</text>

  <circle cx="600" cy="700" r="40" fill="#d9e3f0"/>
  <text x="600" y="760" text-anchor="middle" font-size="14" fill="#333">Member 2</text>

  <circle cx="850" cy="700" r="40" fill="#d9e3f0"/>
  <text x="850" y="760" text-anchor="middle" font-size="14" fill="#333">Member 3</text>

</svg>